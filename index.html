	<style>
		/* ═══ Arknights Opening Intro ═══ */
		.loader-layer {
			position: fixed;
			inset: 0;
			z-index: 999;
			background: #060a0f;
			overflow: hidden;
			font-family: 'Noto Sans SC', sans-serif;
		}

		.ak-intro {
			position: absolute;
			inset: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: space-between;
			padding: 26px 38px;
		}

		/* Background grid */
		.ak-bg-grid {
			position: absolute;
			inset: 0;
			background-image:
				linear-gradient(rgba(0,180,216,.04) 1px, transparent 1px),
				linear-gradient(90deg, rgba(0,180,216,.04) 1px, transparent 1px);
			background-size: 64px 64px;
			opacity: 0;
			animation: akFadeIn .8s .4s forwards;
			pointer-events: none;
		}

		/* Vignette */
		.ak-vignette {
			position: absolute;
			inset: 0;
			background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,.7) 100%);
			pointer-events: none;
		}

		/* CRT scanlines */
		.ak-scanlines {
			position: absolute;
			inset: 0;
			background: repeating-linear-gradient(
				0deg,
				transparent 0px, transparent 2px,
				rgba(0,0,0,.1) 2px, rgba(0,0,0,.1) 3px
			);
			pointer-events: none;
		}

		/* Horizontal sweep line */
		.ak-sweep {
			position: absolute;
			left: 0; right: 0;
			height: 2px;
			background: linear-gradient(to right, transparent, rgba(0,180,216,.95) 50%, transparent);
			box-shadow: 0 0 16px rgba(0,180,216,.8), 0 0 40px rgba(0,180,216,.3);
			animation: akSweep 1.5s .05s ease-in-out forwards;
			opacity: 0;
			pointer-events: none;
		}
		@keyframes akSweep {
			0%   { top: -2px; opacity: 0; }
			4%   { opacity: 1; }
			96%  { opacity: .6; }
			100% { top: 100%; opacity: 0; }
		}

		/* Corner brackets */
		.ak-corner {
			position: absolute;
			width: 26px;
			height: 26px;
			border-style: solid;
			border-color: rgba(0,180,216,.85);
			opacity: 0;
		}
		.ak-tl { top: 22px; left: 22px; border-width: 2px 0 0 2px; animation: akCorner .3s .72s forwards; }
		.ak-tr { top: 22px; right: 22px; border-width: 2px 2px 0 0; animation: akCorner .3s .82s forwards; }
		.ak-bl { bottom: 22px; left: 22px; border-width: 0 0 2px 2px; animation: akCorner .3s .92s forwards; }
		.ak-br { bottom: 22px; right: 22px; border-width: 0 2px 2px 0; animation: akCorner .3s 1.02s forwards; }
		@keyframes akCorner {
			0%   { opacity: 0; transform: scale(.4); }
			65%  { opacity: 1; transform: scale(1.18); }
			100% { opacity: 1; transform: scale(1); }
		}

		/* Header row */
		.ak-header {
			width: 100%;
			display: flex;
			align-items: center;
			gap: 12px;
			opacity: 0;
			animation: akSlideDown .45s .88s forwards;
		}
		.ak-header-dot {
			width: 5px; height: 5px;
			border: 1px solid rgba(0,180,216,.75);
			transform: rotate(45deg);
			flex-shrink: 0;
		}
		.ak-header-label {
			font-size: 11px;
			letter-spacing: 3px;
			color: rgba(0,180,216,.6);
			white-space: nowrap;
		}
		.ak-header-line {
			flex: 1;
			height: 1px;
			background: linear-gradient(to right, rgba(0,180,216,.35), transparent);
		}
		@keyframes akSlideDown {
			from { opacity: 0; transform: translateY(-10px); }
			to   { opacity: 1; transform: translateY(0); }
		}

		/* Main center area */
		.ak-main {
			flex: 1;
			display: flex;
			flex-direction: row;
			align-items: center;
			justify-content: center;
			gap: 48px;
			position: relative;
		}

		/* Side decorative lines */
		.ak-side {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 10px;
			opacity: 0;
			animation: akFadeIn .4s 1.5s forwards;
		}
		.ak-side::before, .ak-side::after {
			content: '';
			display: block;
			width: 1px;
			height: 55px;
			background: linear-gradient(to bottom, transparent, rgba(0,180,216,.4), transparent);
		}
		.ak-side-dot {
			width: 4px; height: 4px;
			background: rgba(0,180,216,.65);
			transform: rotate(45deg);
		}

		/* Logo: diamond */
		.ak-diamond-wrap {
			position: relative;
			width: 100px; height: 100px;
			opacity: 0;
			animation: akLogoIn .65s 1.1s cubic-bezier(.2,.8,.3,1) forwards;
		}
		.ak-diamond-frame {
			position: absolute;
			inset: 8px;
			border: 2px solid rgba(0,180,216,.9);
			transform: rotate(45deg);
			box-shadow: 0 0 18px rgba(0,180,216,.2), inset 0 0 18px rgba(0,180,216,.06);
			animation: akDiamondGlow 3s 1.8s ease-in-out infinite;
		}
		@keyframes akDiamondGlow {
			0%, 100% { box-shadow: 0 0 15px rgba(0,180,216,.2), inset 0 0 12px rgba(0,180,216,.06); }
			50%       { box-shadow: 0 0 36px rgba(0,180,216,.55), inset 0 0 28px rgba(0,180,216,.18); }
		}
		.ak-diamond-core {
			position: absolute;
			top: 50%; left: 50%;
			transform: translate(-50%,-50%) rotate(45deg);
			width: 34px; height: 34px;
			background: rgba(0,180,216,.1);
			border: 1px solid rgba(0,180,216,.5);
			animation: akCorePulse 3s 1.8s ease-in-out infinite;
		}
		@keyframes akCorePulse {
			0%, 100% { background: rgba(0,180,216,.1); }
			50%       { background: rgba(0,180,216,.28); transform: translate(-50%,-50%) rotate(45deg) scale(1.08); }
		}
		.ak-diamond-h {
			position: absolute;
			top: 50%; left: 0; right: 0;
			height: 1px;
			background: rgba(0,180,216,.22);
			transform: translateY(-50%);
		}
		.ak-diamond-v {
			position: absolute;
			left: 50%; top: 0; bottom: 0;
			width: 1px;
			background: rgba(0,180,216,.22);
			transform: translateX(-50%);
		}
		.ak-diamond-ring {
			position: absolute;
			inset: 0;
			border: 1px solid rgba(0,180,216,.12);
			transform: rotate(45deg) scale(1.5);
		}
		@keyframes akLogoIn {
			from { opacity: 0; transform: scale(.5) rotate(-18deg); }
			to   { opacity: 1; transform: scale(1) rotate(0deg); }
		}

		/* Title */
		.ak-title {
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			gap: 9px;
		}
		.ak-title-en {
			font-size: clamp(28px, 4vw, 52px);
			font-weight: 900;
			letter-spacing: 13px;
			color: #fff;
			text-shadow: 0 0 28px rgba(0,180,216,.32);
			clip-path: inset(0 100% 0 0);
			animation: akWipe .85s 1.38s cubic-bezier(.2,.8,.3,1) forwards;
		}
		.ak-title-divider {
			width: 0;
			height: 1px;
			background: linear-gradient(to right, rgba(0,180,216,.7), transparent);
			animation: akExpand .5s 2.1s forwards;
		}
		.ak-title-cn {
			font-size: clamp(13px, 1.8vw, 19px);
			font-weight: 500;
			letter-spacing: 11px;
			color: rgba(0,180,216,.8);
			clip-path: inset(0 100% 0 0);
			animation: akWipe .6s 1.85s cubic-bezier(.2,.8,.3,1) forwards;
		}
		@keyframes akWipe {
			from { clip-path: inset(0 100% 0 0); }
			to   { clip-path: inset(0 0% 0 0); }
		}
		@keyframes akExpand {
			to { width: 240px; }
		}

		/* Footer / loading */
		.ak-footer {
			width: 100%;
			opacity: 0;
			animation: akFadeIn .4s 2.25s forwards;
		}
		.ak-footer-sep {
			width: 100%;
			height: 1px;
			background: linear-gradient(to right, transparent, rgba(0,180,216,.28), transparent);
			margin-bottom: 14px;
		}
		.ak-progress-wrap {
			position: relative;
			height: 2px;
			background: rgba(0,180,216,.12);
		}
		.ak-progress-fill {
			height: 100%;
			width: 0;
			background: linear-gradient(to right, rgba(0,180,216,.45), #00b4d8);
			transition: width .12s linear;
		}
		.ak-progress-head {
			position: absolute;
			top: -4px; left: 0;
			width: 2px; height: 10px;
			background: #fff;
			box-shadow: 0 0 8px #00b4d8, 0 0 16px rgba(0,180,216,.5);
			transition: left .12s linear;
		}
		.ak-progress-meta {
			display: flex;
			justify-content: space-between;
			margin-top: 9px;
		}
		.ak-progress-label {
			font-size: 10px;

		}
		.ak-progress-pct {
			font-size: 10px;
			letter-spacing: 2px;

		.ak-footer-text {

			letter-spacing: 3px;

		/* Shared keyframes */

			from { opacity: 0; }
			to   { opacity: 1; }
		}

			transition: opacity .75s ease;
			opacity: 0;
			pointer-events: none;
		}
	</style>

	<script>
		/* ── Arknights intro: loading bar animation ── */
		(function () {
			var fill, head, pct, cur = 0, tgt = 0, rafId = null;

			function setBar(p) {
				p = Math.max(0, Math.min(100, p));
				if (fill) fill.style.width = p + '%';
				if (head) head.style.left = p + '%';
				if (pct) pct.textContent = Math.round(p) + '%';
			}

			function tick() {
				rafId = null;
				if (cur < tgt) {
					cur += Math.max(0.25, (tgt - cur) * 0.045);
					if (cur >= tgt) cur = tgt;
					setBar(cur);
				}
				if (cur < 100) rafId = requestAnimationFrame(tick);
			}

			function advanceTo(val) {
				if (val > tgt) { tgt = val; if (!rafId) rafId = requestAnimationFrame(tick); }
			}

			/* Simulated milestones (ms from page open) */
			var steps = [[2400,22],[2900,42],[3350,60],[3800,76],[4200,88]];

			document.addEventListener('DOMContentLoaded', function () {
				fill = document.getElementById('ak-fill');
				head = document.getElementById('ak-head');
				pct  = document.getElementById('ak-pct');
				rafId = requestAnimationFrame(tick);
				steps.forEach(function (s) {
					setTimeout(function () { advanceTo(s[1]); }, s[0]);
				});
			});

			/* Called by arknights.js once the page fully loads */
			window._introFinish = function () { advanceTo(100); };
		})();
	</script>
